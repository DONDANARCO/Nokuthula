<!doctype html>
<html lang="en">
  <head>

      name="description"
      content="View practice photos for Foot Med Podiatrist Inc in Polokwane Central."

    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="top-info-bar">
      <div class="container top-info-inner">
        <span class="top-info-item"><strong>Emergency:</strong> 075 958 7273</span>
        <span class="top-info-item"><strong>Hours:</strong> Mon-Fri 08:00-17:00</span>
        <span class="top-info-item"><strong>Location:</strong> Polokwane Central</span>
      </div>
    </div>
    <header class="topbar">
      <div class="container nav">
        <div class="brand brand-with-logo">
          <img class="brand-logo" src="./images/business-logo.png" alt="Foot Med Podiatrist Inc logo" onerror="this.style.display='none'" />
          <span>Foot Med Podiatrist Inc</span>
        </div>
        <nav>
          <a href="./index.html">Home</a>
          <a href="./booking.html">Booking</a>
          <a href="./contact.html">Contact</a>
          <a href="./reviews.html">Reviews</a>
        </nav>
      </div>
    </header>
    <main>
      <section class="page-hero">
        <div class="container">
          <p class="crumb">Home / Gallery</p>
          <h1 class="page-title">Practice gallery</h1>
          <div class="bar"></div>
        </div>
      </section>
      <section class="section">
        <div class="container">
          <span class="section-label">Our clinic visuals</span>
          <h2>Gallery page</h2>
          <p class="section-intro">
            Real treatment-related images used on the Foot Med website.
          </p>
          <div class="gallery">
            <img src="./images/practice-1.png" alt="Callus and corn treatment example image" loading="lazy" />
            <img src="./images/practice-2.png" alt="Athlete foot skin irritation example image" loading="lazy" />
            <img src="./images/practice-3.png" alt="Cracked heels treatment example image" loading="lazy" />
            <img src="./images/practice-4.png" alt="Ingrown toenail inflammation treatment example image" loading="lazy" />
            <img src="./images/practice-5.png" alt="Fungal toenail treatment example image" loading="lazy" />

            <img src="./images/practice-7.png" alt="Heel and forefoot pain example image" loading="lazy" />
            <img src="./images/practice-8.png" alt="Foot ulcer care example image" loading="lazy" />
            <img src="./images/practice-9.png" alt="Sports podiatry and footwear support example image" loading="lazy" />
            <img src="./images/practice-10.png" alt="Plantar wart treatment example image" loading="lazy" />
          </div>
        </div>
      </section>
    </main>
    <script src="./script.js" defer></script>
    <script defer src="/_vercel/insights/script.js"></script>
