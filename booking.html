<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Booking | Footmed Podiatrist Inc</title>
    <meta
      name="description"
      content="Book your podiatry appointment online with Footmed Podiatrist Inc in Polokwane."
    />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
  </head>
  <body>
    <header class="topbar">
      <div class="container nav">
        <div class="brand">Footmed Podiatrist Inc</div>
        <nav>
          <a href="./index.html">Home</a>
          <a href="./contact.html">Contact</a>
          <a href="./reviews.html">Reviews</a>
          <a href="./gallery.html">Gallery</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="section section-alt">
        <div class="container">
          <h1>Online booking page</h1>
          <p class="section-intro">
            Select your preferred slot and send your booking request.
          </p>
          <div class="split">
            <div class="card">
              <h2>Book your slot</h2>
              <p>
                All appointment types are booked through the Calendly calendar.
              </p>
              <a
                class="btn btn-primary"
                href="https://calendly.com/beatsbywebby/consultation"
                target="_blank"
                rel="noopener noreferrer"
                >Open Calendly in new tab</a
              >
            </div>
            <div class="card">
              <h2>Availability calendar</h2>
              <div
                class="calendly-inline-widget"
                data-url="https://calendly.com/beatsbywebby/consultation?background_color=c0294c&text_color=ffffff&primary_color=ffffff"
                style="min-width: 320px; height: 700px;"
              ></div>
              <script
                type="text/javascript"
                src="https://assets.calendly.com/assets/external/widget.js"
                async
              ></script>
            </div>
          </div>
        </div>
      </section>
    </main>
    <script src="./script.js" defer></script>
  </body>
</html>
